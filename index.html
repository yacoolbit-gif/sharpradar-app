<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SharpRadar | Аналитик 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #080810;
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content:'';
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(108,99,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(0,229,160,0.08) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}
::-webkit-scrollbar { width: 0; }

/* ===== HEADER ===== */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,12,22,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 18px;
  flex-shrink: 0;
}
.header-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.app-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg,#6C63FF,#00E5A0);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  flex-shrink: 0;
}
.brand-text h1 { color:#F0F0F8; font-weight:800; font-size:17px; letter-spacing:-0.3px; line-height:1; }
.brand-text p  { color:rgba(240,240,248,0.35); font-size:9px; letter-spacing:2px; font-weight:600; margin-top:2px; }
.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.live-badge {
  background: rgba(0,229,160,0.08);
  border: 1px solid rgba(0,229,160,0.25);
  border-radius: 20px;
  padding: 4px 8px;
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00E5A0;
  box-shadow: 0 0 7px #00E5A0;
  animation: livepulse 1.8s ease-in-out infinite;
}
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.live-badge span { color:#00E5A0; font-size:10px; font-weight:700; }

.logout-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 5px 8px;
  flex-shrink: 0;
  color: rgba(240,240,248,0.35);
  font-size: 10px; font-weight: 600;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.logout-btn:hover { color: rgba(240,240,248,0.7); border-color: rgba(255,255,255,0.15); }

/* Date/time bar */
.header-info-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
}
.hib-datetime {
  display: flex; align-items: center; gap: 6px;
}
.hib-date { color: rgba(240,240,248,0.3); font-size: 10px; font-weight: 600; }
.hib-sep  { color: rgba(255,255,255,0.1); font-size: 10px; }
.hib-time { color: rgba(108,99,255,0.9); font-size: 12px; font-weight: 800; font-variant-numeric: tabular-nums; }
.api-status {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,229,160,0.06);
  border: 1px solid rgba(0,229,160,0.15);
  border-radius: 20px;
  padding: 3px 9px;
}
.api-dot { width:5px; height:5px; border-radius:50%; background:#00E5A0; }
.api-status span { color: rgba(0,229,160,0.7); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }

/* ===== SMART SPORT WIDGET ===== */
.sport-widget {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0 10px;
}
.sw-icon-wrap {
  position: relative;
  width: 48px; height: 48px;
  flex-shrink: 0;
}
.sw-glow {
  position: absolute; inset: -6px;
  border-radius: 50%;
  filter: blur(10px);
  opacity: 0.35;
  transition: background 0.5s, opacity 0.3s;
  animation: swGlowPulse 2.5s ease-in-out infinite;
}
@keyframes swGlowPulse {
  0%,100% { opacity: 0.25; transform: scale(0.9); }
  50%      { opacity: 0.45; transform: scale(1.1); }
}
.sw-icon-bg {
  width: 48px; height: 48px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  transition: background 0.4s, box-shadow 0.4s;
  overflow: hidden;
}
.sw-icon-bg::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.07);
  border-radius: 16px;
}
.sw-svg {
  width: 28px; height: 28px;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  position: relative; z-index: 1;
}
.sw-svg.entering {
  animation: swEnter 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes swEnter {
  0%   { transform: scale(0.3) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg);     opacity: 1; }
}
.sw-info { flex: 1; min-width: 0; }
.sw-sport-name {
  font-size: 15px; font-weight: 800;
  letter-spacing: -0.3px; line-height: 1.1;
  transition: color 0.4s;
}
.sw-sport-sub {
  font-size: 10px; font-weight: 500;
  color: rgba(240,240,248,0.3);
  margin-top: 2px;
  transition: all 0.3s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sw-conf-badge {
  flex-shrink: 0;
  background: rgba(108,99,255,0.15);
  border: 1px solid rgba(108,99,255,0.3);
  border-radius: 10px;
  padding: 4px 8px;
  font-size: 11px; font-weight: 800;
  color: #a09aff;
  pointer-events: none;
  transition: all 0.4s;
}

/* ===== SHARP MONEY BAR ===== */
.sharp-bar {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(8,8,16,0.98);
  border-bottom: 1px solid rgba(108,99,255,0.15);
  flex-shrink: 0;
  position: relative; z-index: 9;
  overflow: hidden;
}
.sharp-bar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(108,99,255,0.5), rgba(0,229,160,0.3), transparent);
}
.sb-main {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 0;
  overflow: hidden;
  padding: 0 4px 0 14px;
}
.sb-block {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 10px;
  border-right: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.sb-block:last-child { border-right: none; }
.sb-label {
  color: rgba(240,240,248,0.25);
  font-size: 8px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  white-space: nowrap;
}
.sb-whale { font-size: 14px; }
.sb-direction {
  font-size: 11px; font-weight: 800;
  white-space: nowrap;
  max-width: 100px; overflow: hidden; text-overflow: ellipsis;
}
.sb-dir-up   { color: #00E5A0; }
.sb-dir-down { color: #FF4566; }
.sb-dir-none { color: rgba(240,240,248,0.3); }
.sb-clv-pos { color: #00E5A0; font-size: 12px; font-weight: 800; }
.sb-clv-neg { color: #FF4566; font-size: 12px; font-weight: 800; }
.sb-clv-nil { color: rgba(240,240,248,0.3); font-size: 11px; font-weight: 600; }
.sb-steam-yes {
  background: rgba(255,69,102,0.15);
  border: 1px solid rgba(255,69,102,0.35);
  border-radius: 5px; padding: 2px 6px;
  color: #FF4566; font-size: 9px; font-weight: 800;
  animation: livepulse 1.2s infinite;
}
.sb-steam-no {
  color: rgba(240,240,248,0.2);
  font-size: 10px; font-weight: 600;
}
.sb-req-block {
  display: flex; align-items: center; gap: 3px;
  padding: 8px 10px 8px 8px;
  flex-shrink: 0;
}
.sb-req-dots { display: flex; gap: 2px; flex-wrap: wrap; max-width: 44px; }
.sb-req-dot { width: 5px; height: 5px; border-radius: 50%; }
.sb-req-dot.used  { background: rgba(255,255,255,0.1); }
.sb-req-dot.avail { background: #6C63FF; box-shadow: 0 0 4px rgba(108,99,255,0.7); }

/* ===== REFRESH BUTTON ===== */
.refresh-btn {
  width: 38px; height: 38px;
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.25);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  margin: 5px 10px 5px 0;
  transition: all 0.2s;
  font-size: 15px;
  color: #6C63FF;
}
.refresh-btn:active { transform: scale(0.9); background: rgba(108,99,255,0.2); }
.refresh-btn.spinning { animation: spin 0.7s linear infinite; }
@keyframes refreshPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.15); background: rgba(0,229,160,0.2); border-color: rgba(0,229,160,0.5); }
  100% { transform: scale(1); }
}
.refresh-btn.done { animation: refreshPop 0.4s ease; }

/* ===== LIVE TICKER ===== */
.live-ticker {
  background: rgba(108,99,255,0.05);
  border-bottom: 1px solid rgba(108,99,255,0.12);
  padding: 0 18px;
  overflow: hidden;
  height: 36px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative; z-index: 5;
}
.ticker-label {
  color: #6C63FF;
  font-size: 9px; font-weight: 800;
  letter-spacing: 1.5px;
  white-space: nowrap;
  margin-right: 12px;
  flex-shrink: 0;
}
.ticker-track {
  overflow: hidden;
  flex: 1;
}
.ticker-inner {
  display: flex;
  gap: 32px;
  animation: ticker 30s linear infinite;
  width: max-content;
}
@keyframes ticker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  white-space: nowrap;
  font-size: 11px; font-weight: 600;
  color: rgba(240,240,248,0.6);
  display: flex; align-items: center; gap: 6px;
}
.ticker-item .t-score {
  color: #FFB830; font-weight: 800;
}
.ticker-item .t-live {
  background: rgba(255,69,102,0.15);
  border: 1px solid rgba(255,69,102,0.3);
  border-radius: 4px;
  padding: 1px 4px;
  color: #FF4566; font-size: 8px; font-weight: 800;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  padding: 0 18px;
  background: rgba(12,12,22,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
  position: relative; z-index: 5;
}
.tab {
  flex: 1; padding: 11px 0;
  font-size: 11px;
  background: none; border: none;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500; letter-spacing: 0.3px;
  transition: all 0.25s;
  border-bottom: 2px solid transparent;
  color: rgba(240,240,248,0.2);
}
.tab.active { color: #6C63FF; border-bottom-color: #6C63FF; font-weight: 700; }

/* ===== CONTENT ===== */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
  position: relative; z-index: 1;
  -webkit-overflow-scrolling: touch;
}
.section { display: none; }
.section.active { display: block; }

/* ===== TOP PICKS ===== */
.section-title {
  color: rgba(240,240,248,0.5);
  font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.section-title::after {
  content: '';
  flex: 1; height: 1px;
  background: rgba(255,255,255,0.06);
}
.top-picks-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 18px;
}
.pick-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 13px 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
  cursor: pointer;
}
.pick-card:active { transform: scale(0.98); }
.pick-rank {
  font-size: 18px;
  flex-shrink: 0;
}
.pick-body { flex: 1; min-width: 0; }
.pick-match {
  color: #F0F0F8;
  font-size: 12px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pick-meta {
  color: rgba(240,240,248,0.35);
  font-size: 10px; font-weight: 500;
  margin-top: 2px;
}
.pick-right {
  text-align: right;
  flex-shrink: 0;
}
.pick-odds {
  color: #FFB830;
  font-size: 14px; font-weight: 800;
}
.pick-conf {
  font-size: 9px; font-weight: 700;
  margin-top: 3px;
  padding: 2px 6px;
  border-radius: 6px;
}
.conf-high { background: rgba(0,229,160,0.12); color: #00E5A0; }
.conf-mid  { background: rgba(255,184,48,0.12); color: #FFB830; }

/* ===== LIVE MATCHES ===== */
.live-matches { margin-bottom: 16px; }
.live-match-card {
  background: rgba(255,69,102,0.04);
  border: 1px solid rgba(255,69,102,0.12);
  border-radius: 14px;
  padding: 11px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.live-match-card:active { transform: scale(0.98); }
.lm-sport { font-size: 16px; flex-shrink: 0; }
.lm-body { flex: 1; min-width: 0; }
.lm-teams {
  color: #F0F0F8;
  font-size: 12px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lm-minute { color: rgba(240,240,248,0.35); font-size: 10px; margin-top: 2px; }
.lm-score {
  font-size: 18px; font-weight: 800;
  color: #FFB830;
  flex-shrink: 0;
}
.lm-live-badge {
  background: rgba(255,69,102,0.15);
  border: 1px solid rgba(255,69,102,0.3);
  border-radius: 6px;
  padding: 2px 6px;
  color: #FF4566;
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.5px;
  flex-shrink: 0;
  animation: livepulse 1.5s infinite;
}

/* ===== HISTORY ===== */
.history-list { margin-bottom: 18px; }
.history-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: all 0.2s;
}
.history-item:active { transform: scale(0.98); background: rgba(108,99,255,0.06); }
.hi-sport { font-size: 15px; flex-shrink: 0; }
.hi-body  { flex: 1; min-width: 0; }
.hi-match { color: rgba(240,240,248,0.8); font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hi-meta  { color: rgba(240,240,248,0.25); font-size: 10px; margin-top: 2px; }
.hi-right { text-align: right; flex-shrink: 0; }
.hi-conf  { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
.hi-time  { color: rgba(240,240,248,0.2); font-size: 9px; margin-top: 3px; }

/* ===== RUN BUTTON STATES ===== */
.btn-ready {
  background: linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,229,160,0.06)) !important;
  border: 1px solid rgba(0,229,160,0.3) !important;
  color: #00E5A0 !important;
  box-shadow: 0 6px 28px rgba(0,229,160,0.15) !important;
}

/* ===== HISTORY ===== */
.label { color: rgba(240,240,248,0.4); font-size: 12px; font-weight: 500; margin-bottom: 8px; }
input[type=text], input[type=password] {
  width: 100%; padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  color: #F0F0F8;
  font-size: 13px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500;
  outline: none;
  transition: all 0.2s;
  margin-bottom: 12px;
}
input:focus { border-color: rgba(255,255,255,0.18); box-shadow: 0 0 0 3px rgba(108,99,255,0.3); }
input::placeholder { color: rgba(240,240,248,0.2); }
.btn-primary {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg,#6C63FF,#9B59F5);
  border: none; border-radius: 16px;
  cursor: pointer; color: #FFF;
  font-size: 13px; font-weight: 800; letter-spacing: 0.8px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  box-shadow: 0 6px 28px rgba(108,99,255,0.35);
  transition: all 0.3s;
}
.btn-primary:disabled {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(240,240,248,0.15);
  box-shadow: none; cursor: not-allowed;
}
.btn-green {
  width: 100%; padding: 12px;
  background: rgba(0,229,160,0.08);
  border: 1px solid rgba(0,229,160,0.22);
  border-radius: 14px; cursor: pointer;
  color: #00E5A0;
  font-size: 12px; font-weight: 700;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-top: 10px;
}
.btn-copy {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg,rgba(255,184,48,0.12),rgba(255,100,50,0.08));
  border: 1px solid rgba(255,184,48,0.3);
  border-radius: 16px; cursor: pointer;
  color: #FFB830;
  font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-bottom: 12px;
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-copy.copied {
  background: linear-gradient(135deg,rgba(0,229,160,0.12),rgba(0,229,160,0.04));
  border-color: rgba(0,229,160,0.35); color: #00E5A0;
}
.glass-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 16px; margin-bottom: 10px;
}
.verdict-card {
  background: rgba(255,184,48,0.03);
  border: 1px solid rgba(255,184,48,0.1);
  border-radius: 20px; padding: 16px;
}
.shortcuts { display: flex; gap: 8px; margin-top: 10px; }
.shortcut {
  flex: 1; padding: 9px;
  border-radius: 12px; cursor: pointer;
  font-size: 11px; font-weight: 700;
  font-family: 'Plus Jakarta Sans', sans-serif;
  border: none; transition: all 0.2s;
}
.shortcut-purple { background: rgba(108,99,255,0.1); color: #6C63FF; border: 1px solid rgba(108,99,255,0.25); }
.shortcut-green  { background: rgba(0,229,160,0.08); color: #00E5A0; border: 1px solid rgba(0,229,160,0.22); }
.analysis-text { font-size: 11px; line-height: 1.7; white-space: pre-wrap; }
.analysis-text .line-title   { color: #FFB830; font-weight: 700; font-size: 13px; }
.analysis-text .line-section { color: #F0F0F8; font-weight: 700; font-size: 12px; }
.analysis-text .line-match   { color: #F0F0F8; font-weight: 700; font-size: 13px; }
.analysis-text .line-point   { color: #F0F0F8; font-weight: 500; }
.analysis-text .line-top1    { color: #00E5A0; }
.analysis-text .line-top2    { color: rgba(0,229,160,0.75); }
.analysis-text .line-top3    { color: rgba(0,229,160,0.55); }
.analysis-text .line-muted   { color: rgba(240,240,248,0.4); }
.loading { text-align: center; padding: 52px 0; }
.loading .icon { font-size: 38px; margin-bottom: 16px; }
.loading h3 { color: #F0F0F8; font-size: 15px; font-weight: 800; }
.loading p  { color: rgba(240,240,248,0.4); font-size: 12px; margin-top: 6px; }
.dots { display: flex; justify-content: center; gap: 8px; margin-top: 22px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #6C63FF; box-shadow: 0 0 8px rgba(108,99,255,0.35); animation: pulse 1.4s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:0.25s;} .dot:nth-child(3){animation-delay:0.5s;}
.empty { text-align: center; padding: 52px 24px; }
.empty .icon { font-size: 36px; opacity: 0.4; margin-bottom: 14px; }
.empty p { color: rgba(240,240,248,0.4); font-size: 13px; }

/* ===== FOOTER ===== */
.app-footer {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 8px 18px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(12,12,22,0.95);
  flex-shrink: 0;
  position: relative; z-index: 5;
}
.app-footer span { color: rgba(240,240,248,0.15); font-size: 10px; font-weight: 600; }
.footer-dot { width: 5px; height: 5px; border-radius: 50%; background: #6C63FF; box-shadow: 0 0 5px #6C63FF; display: inline-block; margin-right: 5px; }

/* ===== LOGIN ===== */
#login-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  position: relative; z-index: 10;
}
.login-logo { text-align: center; margin-bottom: 40px; }
.login-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg,#6C63FF,#00E5A0);
  border-radius: 22px; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  box-shadow: 0 10px 40px rgba(108,99,255,0.35);
}
.login-title { color: #F0F0F8; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.login-sub   { color: rgba(240,240,248,0.4); font-size: 12px; letter-spacing: 2px; font-weight: 600; margin-top: 4px; }
.login-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px; padding: 28px 24px;
  width: 100%; max-width: 360px;
}
